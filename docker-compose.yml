services:
  postgres:
    image: postgres:16-alpine
    container_name: koleso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: koleso
      POSTGRES_PASSWORD: koleso
      POSTGRES_DB: koleso
    ports:
      - "5432:5432"
    volumes:
      - koleso-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koleso -d koleso"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  koleso-pgdata:
